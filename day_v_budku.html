<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дай в будку!</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .game-container {
            position: relative;
            width: 100%;
            height: 80vh;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(5px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            overflow: hidden;
        }

        .target {
            position: absolute;
            width: 100px;
            height: 100px;
            cursor: crosshair;
            transition: transform 0.1s;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            object-fit: cover;
            border: 3px solid white;
        }

        .target:hover {
            transform: scale(1.1);
            filter: brightness(1.2);
        }

        .target:active {
            transform: scale(0.95);
        }

        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            font-size: 24px;
            font-weight: bold;
            color: #333;
            border: 2px solid rgba(255,255,255,0.8);
            z-index: 1000;
        }

        .score {
            color: #667eea;
            font-size: 32px;
            margin-left: 10px;
        }

        .restart-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 30px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(255,107,107,0.4);
            z-index: 1000;
        }

        .restart-btn:hover {
            background: #ff5252;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255,82,82,0.5);
        }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px 50px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            text-align: center;
            display: none;
            z-index: 2000;
        }

        .game-over h2 {
            color: #333;
            font-size: 36px;
            margin-bottom: 20px;
        }

        .final-score {
            font-size: 48px;
            color: #667eea;
            font-weight: bold;
            margin: 20px 0;
        }

        .play-again {
            padding: 12px 40px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .play-again:hover {
            background: #5a67d8;
            transform: scale(1.05);
        }

        .instructions {
            position: fixed;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 16px;
            background: rgba(0,0,0,0.3);
            padding: 10px 20px;
            border-radius: 10px;
            backdrop-filter: blur(5px);
        }

        .sound-toggle {
            position: fixed;
            bottom: 20px;
            left: 20px;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.95);
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            z-index: 1000;
            transition: all 0.3s;
        }

        .sound-toggle:hover {
            background: white;
            transform: scale(1.05);
        }

        .sound-toggle.muted {
            background: rgba(255, 100, 100, 0.95);
        }

        @keyframes pop {
            0% { transform: scale(0); }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .target {
            animation: pop 0.3s ease-out;
        }

        @keyframes hit {
            0% { transform: scale(1); }
            50% { transform: scale(0.5); opacity: 0.5; }
            100% { transform: scale(0); opacity: 0; }
        }

        .target-hit {
            animation: hit 0.1s ease-out forwards;
        }

        .sound-status {
            position: fixed;
            bottom: 80px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 1000;
            display: none;
        }

        .sound-status.show {
            display: block;
            animation: fadeOut 2s forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="instructions">🔫 Дай в будку! Кликай по фото!</div>
    <div class="stats">
        Счёт: <span class="score" id="score">0</span>
    </div>
    <button class="sound-toggle" id="soundToggle">
        <span id="soundIcon">🔊</span>
        <span id="soundText">Звук вкл</span>
    </button>
    <div class="sound-status" id="soundStatus"></div>
    <div class="game-container" id="gameContainer">
        <!-- Сюда будут добавляться фото -->
    </div>
    <button class="restart-btn" onclick="restartGame()">🔄 Новая игра</button>

    <div class="game-over" id="gameOver">
        <h2>Игра окончена!</h2>
        <div class="final-score" id="finalScore">0</div>
        <button class="play-again" onclick="restartGame()">Играть снова</button>
    </div>

    <script>
        const images = [
            'src/1.jpg',
            'src/2.jpg',
            'src/3.jpg',
            'src/4.jpg',
            'src/5.jpg'
        ];

        // Массив с звуковыми файлами
        const soundFiles = [
            'src/music/music1.mp3',
            'src/music/music2.mp3',
            'src/music/music3.mp3'
        ];

        let score = 0;
        let activeTargets = [];
        let gameActive = true;
        let targetInterval;
        let soundEnabled = true;
        let loadedSounds = [];

        const gameContainer = document.getElementById('gameContainer');
        const scoreElement = document.getElementById('score');
        const gameOverElement = document.getElementById('gameOver');
        const finalScoreElement = document.getElementById('finalScore');
        const soundToggle = document.getElementById('soundToggle');
        const soundIcon = document.getElementById('soundIcon');
        const soundText = document.getElementById('soundText');
        const soundStatus = document.getElementById('soundStatus');

        // Функция для получения случайного звука
        function getRandomSoundFile() {
            const randomIndex = Math.floor(Math.random() * soundFiles.length);
            return soundFiles[randomIndex];
        }

        // Предзагружаем все звуки
        function preloadSounds() {
            soundFiles.forEach((file, index) => {
                const audio = new Audio();
                audio.src = file;
                audio.volume = 0.5;

                audio.addEventListener('canplaythrough', () => {
                    loadedSounds[index] = audio;
                    console.log(`Звук ${index + 1} загружен`);
                });

                audio.addEventListener('error', (e) => {
                    console.error(`Ошибка загрузки звука ${file}:`, e);
                    showStatus(`❌ Ошибка загрузки ${file.split('/').pop()}`, true);
                });

                audio.load();
            });
        }

        // Функция показа статуса
        function showStatus(message, isError = false) {
            soundStatus.textContent = message;
            soundStatus.classList.add('show');
            setTimeout(() => {
                soundStatus.classList.remove('show');
            }, 2000);
        }

        // Функция воспроизведения случайного звука
        function playRandomHitSound() {
            if (!soundEnabled) return;

            try {
                // Получаем случайный звуковой файл
                const randomSoundFile = getRandomSoundFile();

                // Создаем новую копию звука для воспроизведения
                const soundCopy = new Audio();
                soundCopy.src = randomSoundFile;
                soundCopy.volume = 0.5;

                // Воспроизводим звук
                soundCopy.play().catch(e => {
                    console.log('Ошибка воспроизведения:', e);
                });
            } catch (e) {
                console.log('Ошибка воспроизведения звука:', e);
            }
        }

        // Обработчик кнопки звука
        soundToggle.addEventListener('click', () => {
            soundEnabled = !soundEnabled;
            if (soundEnabled) {
                soundIcon.textContent = '🔊';
                soundText.textContent = 'Звук вкл';
                soundToggle.classList.remove('muted');
                showStatus('🔊 Звук включен');
            } else {
                soundIcon.textContent = '🔇';
                soundText.textContent = 'Звук выкл';
                soundToggle.classList.add('muted');
                showStatus('🔇 Звук выключен');
            }
        });

        function getRandomPosition() {
            const containerWidth = gameContainer.offsetWidth;
            const containerHeight = gameContainer.offsetHeight;
            const targetSize = 100;

            const maxX = containerWidth - targetSize - 20;
            const maxY = containerHeight - targetSize - 20;

            const x = Math.max(10, Math.min(maxX, Math.random() * maxX));
            const y = Math.max(10, Math.min(maxY, Math.random() * maxY));

            return { x, y };
        }

        function createTarget() {
            if (!gameActive || activeTargets.length >= 3) return;

            const position = getRandomPosition();
            const randomImage = images[Math.floor(Math.random() * images.length)];

            const img = document.createElement('img');
            img.className = 'target';
            img.src = randomImage;
            img.style.left = position.x + 'px';
            img.style.top = position.y + 'px';
            img.alt = 'Цель';

            img.addEventListener('click', function(e) {
                e.stopPropagation();
                if (!gameActive) return;

                // Воспроизводим случайный звук
                playRandomHitSound();

                // Добавляем класс для анимации попадания
                this.classList.add('target-hit');

                // Увеличиваем счёт
                score += 10;
                scoreElement.textContent = score;

                // Удаляем кликнутое фото после анимации
                setTimeout(() => {
                    this.remove();
                    activeTargets = activeTargets.filter(t => t !== this);

                    // Добавляем новое фото через небольшую задержку
                    setTimeout(() => {
                        if (gameActive && activeTargets.length < 3) {
                            createTarget();
                        }
                    }, 200);
                }, 100);
            });

            gameContainer.appendChild(img);
            activeTargets.push(img);
        }

        function startGame() {
            gameActive = true;
            score = 0;
            scoreElement.textContent = score;
            gameOverElement.style.display = 'none';

            // Очищаем все текущие цели
            activeTargets.forEach(target => target.remove());
            activeTargets = [];

            // Создаём 3 цели с интервалом
            for (let i = 0; i < 3; i++) {
                setTimeout(() => {
                    if (gameActive) {
                        createTarget();
                    }
                }, i * 500);
            }

            // Проверяем окончание игры
            targetInterval = setInterval(() => {
                if (activeTargets.length === 0 && gameActive) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            gameActive = false;
            clearInterval(targetInterval);
            finalScoreElement.textContent = score;
            gameOverElement.style.display = 'block';

            // Удаляем все оставшиеся цели
            activeTargets.forEach(target => target.remove());
            activeTargets = [];
        }

        function restartGame() {
            endGame();
            startGame();
        }

        // Адаптация при изменении размера окна
        window.addEventListener('resize', () => {
            if (gameActive) {
                activeTargets.forEach(target => {
                    const position = getRandomPosition();
                    target.style.left = position.x + 'px';
                    target.style.top = position.y + 'px';
                });
            }
        });

        // Запускаем игру при загрузке
        window.addEventListener('load', () => {
            startGame();
            preloadSounds();

            // Показываем инструкцию
            setTimeout(() => {
                showStatus('🎮 Игра готова! Кликай по фото!');
            }, 1000);
        });

        // Активируем звук при первом клике
        document.addEventListener('click', function initAudio() {
            // Создаем и сразу останавливаем пустой звук для активации аудио контекста
            const silentSound = new Audio();
            silentSound.play().catch(() => {});

            if (soundEnabled) {
                showStatus('🔊 Звук активирован!');
            }
        }, { once: true });
    </script>
</body>
</html>
